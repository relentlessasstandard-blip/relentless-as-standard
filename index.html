  <title>Relentless.As.Standard</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --charcoal: #0B0B0B;
      --neon: #39FF14;
      --deep-red: #8B0000;
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }
    body { background-color: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── NAVBAR ── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(57,255,20,0.1);
    }
    .nav-logo { font-family: 'Anton', sans-serif; font-size: 1.4rem; letter-spacing: 1px; text-transform: uppercase; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--neon); }

    .nav-right { display: flex; align-items: center; gap: 30px; }
    .nav-links { display: flex; gap: 15px; list-style: none; }
    .nav-links a { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--white); text-decoration: none; letter-spacing: 1px; }
    .nav-links a:hover { color: var(--neon); }

    .nav-socials-top { display: flex; gap: 12px; border-left: 1px solid #333; padding-left: 20px; }
    .nav-socials-top svg { width: 18px; height: 18px; fill: var(--white); transition: fill 0.2s; }
    .nav-socials-top a:hover svg { fill: var(--neon); }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1555597673-b21d5c935865?q=80&w=2000') no-repeat center center/cover;
    }
    .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.95) 100%); }
    .hero-content { position: relative; z-index: 2; max-width: 900px; padding: 20px; }
    
    /* Replicating screenshot font style */
    .hero-headline { font-family: 'Anton', sans-serif; font-size: clamp(3rem, 8vw, 6.5rem); line-height: 0.9; margin-bottom: 35px; text-transform: uppercase; }
    .hero-headline .neon-part { color: var(--neon); display: block; }
