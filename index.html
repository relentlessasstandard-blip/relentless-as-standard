<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relentless.As.Standard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --charcoal: #0B0B0B;
      --charcoal2: #111111;
      --neon: #39FF14;
      --deep-red: #8B0000;
      --white: #ffffff;
      --gray: #888888;
      --light-gray: #cccccc;
    }

    html { scroll-behavior: smooth; }
    body { background-color: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── NAVBAR ── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(57,255,20,0.1);
    }
    .nav-logo { font-family: 'Anton', sans-serif; font-size: 1.4rem; letter-spacing: 1px; text-transform: uppercase; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--neon); }

    .nav-right { display: flex; align-items: center; gap: 30px; }
    .nav-links { display: flex; gap: 15px; list-style: none; }
    .nav-links a { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--white); text-decoration: none; letter-spacing: 1px; }
    .nav-links a:hover { color: var(--neon); }

    .nav-socials-top { display: flex; gap: 12px; border-left: 1px solid #333; padding-left: 20px; }
    .nav-socials-top svg { width: 18px; height: 18px; fill: var(--white); transition: fill 0.2s; }
    .nav-socials-top a:hover svg { fill: var(--neon); }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1555597673-b21d5c935865?q=80&w=2000') no-repeat center center/cover;
    }
    .hero-overlay { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.95) 100%); }
    .hero-content { position: relative; z-index: 2; max-width: 900px; padding: 20px; }
    .hero-headline { font-family: 'Anton', sans-serif; font-size: clamp(3rem, 8vw, 6rem); line-height: 1; margin-bottom: 30px; }
    .hero-headline span { color: var(--neon); }

    .btn-arena {
      display: inline-block;
      padding: 18px 45px;
      background: var(--neon);
      color: var(--black);
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      box-shadow: 0 0 25px rgba(57,255,20,0.5);
      margin-bottom: 25px;
    }

    .hero-social-hub { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .btn-mini-social {
      padding: 8px 18px;
      border: 1px solid var(--neon);
      color: var(--neon);
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      border-radius: 4px;
      transition: 0.3s;
    }
    .btn-mini-social:hover { background: var(--neon); color: black; }

    /* ── ACT SECTIONS ── */
    .section-padding { padding: 120px 40px; }
    .act-section:nth-child(even) { background: var(--charcoal); }
    .act-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .reversed { direction: rtl; }
    .reversed > * { direction: ltr; }

    .act-title { font-family: 'Anton', sans-serif; font-size: clamp(2rem, 4vw, 3.5rem); margin-bottom: 20px; text-transform: uppercase; line-height: 1.1; }
    .act-quote { font-family: 'Montserrat', sans-serif; font-style: italic; color: var(--neon); border-left: 3px solid var(--neon); padding-left: 20px; margin-bottom: 20px; font-weight: 700; line-height: 1.5; }

    /* ── VIDEO BOXES ── */
    .video-wrap { position: relative; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    .video-thumb { cursor: pointer; aspect-ratio: 9/16; position: relative; overflow: hidden; }
    .video-thumb.square { aspect-ratio: 1/1; }
    .video-thumb-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: 0.5s; }
    .video-thumb:hover .video-thumb-bg { transform: scale(1.08); }
    .video-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
    .video-thumb:hover .video-overlay { background: rgba(0,0,0,0.1); }
    .video-overlay svg { width: 55px; fill: var(--neon); filter: drop-shadow(0 0 10px rgba(57,255,20,0.6)); }

    .video-frame-wrap { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .video-frame-wrap.active { display: block; z-index: 5; }
    iframe { width: 100%; height: 100%; border: none; }

    /* ── FOOTER & SOCIALS ── */
    #final-cta { padding: 140px 40px; text-align: center; background: linear-gradient(180deg, var(--deep-red) 0%, var(--black) 100%); }
    .cta-headline { font-family: 'Anton', sans-serif; font-size: clamp(1.8rem, 5vw, 3.5rem); margin-bottom: 50px; line-height: 1.3; }
    
    .social-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .social-card {
      width: 180px; padding: 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; text-decoration: none; color: white; transition: 0.3s; text-align: center;
    }
    .social-card:hover { background: var(--neon); color: black; border-color: var(--neon); transform: translateY(-8px); }
    .social-card span { display: block; font-weight: 900; margin-top: 12px; font-size: 0.75rem; letter-spacing: 1px; }

    footer { padding: 80px 40px; background: var(--black); text-align: center; border-top: 1px solid #222; }
    .footer-logo { font-family: 'Anton', sans-serif; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 10px; }
    .footer-logo span { color: var(--neon); }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      #navbar { padding: 15px 20px; }
      .nav-right { display: none; }
      .act-inner { grid-template-columns: 1fr; text-align: center; gap: 40px; }
      .video-thumb { aspect-ratio: 16/9; }
      .video-thumb.square { aspect-ratio: 1/1; }
      .social-card { width: 45%; }
    }
  </style>
</head>
<body>

<nav id="navbar">
  <a href="#hero" class="nav-logo">Relentless.<span>As.Standard</span></a>
  <div class="nav-right">
    <ul class="nav-links">
